<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Document Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto; /* ফাইল বড় হলে স্ক্রল করার সুবিধা */
            background-color: #f7fafc;
            font-family: sans-serif;
        }
        
        #viewer-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            min-height: 100vh;
            padding: 10px;
            box-sizing: border-box;
        }

        #imagePreview {
            max-width: 100%;
            height: auto;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #4a5568;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="status">Loading Document...</div>
    <div id="viewer-container">
        <img id="imagePreview" src="" alt="Document Preview">
    </div>

<script>
    const secretKey = "MyGitHubSecureKey123";

    const urlParams = new URLSearchParams(window.location.search);
    const encryptedData = urlParams.get('file');
    const statusDiv = document.getElementById('status');
    const imgPreview = document.getElementById('imagePreview');

    if (encryptedData) {
        try {
            // URL-Safe ডাটাকে আবার আগের রূপে ফিরিয়ে আনা
            let formattedData = encryptedData.replace(/-/g, '+').replace(/_/g, '/');
            
            // ডিক্রিপ্ট (Decryption) করা
            const bytes = CryptoJS.AES.decrypt(formattedData, secretKey);
            const decryptedLink = bytes.toString(CryptoJS.enc.Utf8);

            // লিঙ্ক সঠিক হলে ইমেজ ট্যাগ-এ বসিয়ে দেওয়া
            if (decryptedLink && decryptedLink.startsWith('http')) {
                statusDiv.style.display = 'none';
                imgPreview.src = decryptedLink;
                imgPreview.style.display = 'block';
            } else {
                statusDiv.innerText = "Error: Invalid file link.";
            }
        } catch (e) {
            statusDiv.innerText = "Error: Decryption failed.";
        }
    } else {
        statusDiv.innerText = "Error: No file specified.";
    }
</script>

</body>
</html>
